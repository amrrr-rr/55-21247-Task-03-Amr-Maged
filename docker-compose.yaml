services:
  postgres:
    image: postgres:17
    container_name: task03-postgres
    environment:
      POSTGRES_DB: task03db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Application ──────────────────────────────────────────────
  # TODO: Uncomment this entire block (remove the leading "#" from every line)
  #       and replace the placeholder values with your personal info.
  #       See the Configuration section of the Task 3 spec for full instructions.
  #
  # Example: 55-8078_container
  app:
    build: .
    container_name: 55-21247_container
    ports:
      # Example: "8078:8080"
      - "21247:8080"
    environment:
      # Example: Compose_Mohamed_Ayman
      USER_NAME: Compose_Amr_Maged
      # Example: Compose_55_8078
      ID: Compose_55_21247
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/task03db
    depends_on:
      - postgres

volumes:
  pgdata:
